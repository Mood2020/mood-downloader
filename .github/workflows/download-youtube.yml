name: 🎬 OurTube Pro Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "لینک یوتیوب (چندتا با فاصله)"
        required: true
        type: string
      quality:
        description: "کیفیت (1080 / 720 / 480 / 360 / mp3)"
        required: false
        default: "720"

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg zip p7zip-full
          pip install yt-dlp

      - name: Prepare
        run: mkdir -p output

      - name: Download videos
        run: |
          QUALITY="${{ github.event.inputs.quality }}"
          URLS="${{ github.event.inputs.urls }}"

          case $QUALITY in
            1080)
              FORMAT="bestvideo[height<=1080]+bestaudio/best"
              ;;
            720)
              FORMAT="bestvideo[height<=720]+bestaudio/best"
              ;;
            480)
              FORMAT="bestvideo[height<=480]+bestaudio/best"
              ;;
            360)
              FORMAT="bestvideo[height<=360]+bestaudio/best"
              ;;
            mp3)
              FORMAT="bestaudio"
              ;;
            *)
              FORMAT="best"
              ;;
          esac

          for url in $URLS; do
            if [ "$QUALITY" = "mp3" ]; then
              yt-dlp "$url" \
                -x --audio-format mp3 \
                -o "output/%(title)s.%(ext)s"
            else
              yt-dlp "$url" \
                --format "$FORMAT" \
                --merge-output-format mp4 \
                -o "output/%(title)s.%(ext)s"
            fi
          done

      - name: Split large files
        run: |
          cd output
          for file in *; do
            if [ -f "$file" ]; then
              zip -s 1900m "${file}.zip" "$file"
            fi
          done

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "download-${{ github.run_number }}"
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
